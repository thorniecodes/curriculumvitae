<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    {% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
    {% include head-custom.html %}
  </head>
  <body class="home-page">

    <a class="skip-link" href="#main-content">Skip to main content</a>

    <nav class="site-nav" aria-label="Site navigation">
      <div class="nav-inner">
        <button class="nav-hamburger" aria-expanded="false" aria-controls="home-nav-list" aria-label="Open navigation menu">
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
          <span class="hamburger-bar"></span>
        </button>
        <ul class="nav-list" id="home-nav-list" role="list">
          <li class="nav-item"><a class="nav-link" href="{{ '/research' | relative_url }}">Research</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ '/public-scholarship' | relative_url }}">Public Scholarship</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ '/publications' | relative_url }}">Publications</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ '/cv' | relative_url }}">CV</a></li>
        </ul>
      </div>
    </nav>

    <main id="main-content" tabindex="-1">
      <div class="home-hero">
        {% if site.photo %}
        <img src="{{ site.photo | relative_url }}" alt="Portrait of Kate Thornhill" class="home-photo">
        {% endif %}
        <h1 class="home-name">Kate Thornhill</h1>
        <p class="home-title">Researcher &middot; Librarian &middot; Public Scholar</p>
        {{ content }}
      </div>
    </main>

    <footer class="site-footer" role="contentinfo">
      <div class="footer-inner">
        <p>Kate Thornhill &middot; Eugene, Oregon</p>
      </div>
    </footer>

    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
    <script>
      (function () {
        var hamburger = document.querySelector('.nav-hamburger');
        var navList   = document.getElementById('home-nav-list');
        if (!hamburger || !navList) return;

        hamburger.addEventListener('click', function () {
          var isOpen = this.getAttribute('aria-expanded') === 'true';
          this.setAttribute('aria-expanded', String(!isOpen));
          this.setAttribute('aria-label', isOpen ? 'Open navigation menu' : 'Close navigation menu');
          navList.classList.toggle('is-open', !isOpen);
        });

        navList.querySelectorAll('a').forEach(function (link) {
          link.addEventListener('click', function () {
            hamburger.setAttribute('aria-expanded', 'false');
            hamburger.setAttribute('aria-label', 'Open navigation menu');
            navList.classList.remove('is-open');
          });
        });
      }());
    </script>

  </body>
</html>
